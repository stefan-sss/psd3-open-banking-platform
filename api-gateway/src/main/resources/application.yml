server:
  port: 8080 

spring:
   application:
       name: api-gateway
       
   cloud:
      gateway:
         routes:
            -id: consent-service
            uri: http://localhost:8081
            pridicates:
               -Path=/api/consents/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always